/* ── Render task bank ── */
function renderTaskBank() {
  const unplaced = tasks.filter(t => !t.placed);
  if (unplaced.length === 0) {
    $taskBank.innerHTML = '<div class="empty-bank">No tasks in bank.<br>Create one above or remove from chart.</div>';
    return;
  }
  $taskBank.innerHTML = unplaced.map(t => {
    const tooLong = t.weeks > weeks.length;
    return `
    <div class="task-bank-item ${tooLong ? 'too-long' : ''}" draggable="${!tooLong}" data-task-id="${t.id}" style="background:${t.color};" ${tooLong ? 'title="Task exceeds date range"' : ''}>
      <span class="bank-color-dot" data-task-id="${t.id}" title="Change color" style="background:rgba(255,255,255,0.3);"></span>
      <span class="bank-name-group">
        <span class="category-badge ${t.category ? '' : 'no-cat'}" data-task-id="${t.id}" title="Change tag">${t.category ? escHtml(t.category) : '+ tag'}</span>
        <span class="task-name">${escHtml(t.name)}</span>
      </span>
      <span class="task-weeks">${t.weeks}w</span>
      <button class="delete-task" data-task-id="${t.id}">&times;</button>
    </div>`;
  }).join('');

  $taskBank.querySelectorAll('.task-bank-item').forEach(el => {
    el.addEventListener('dragstart', onBankDragStart);
    el.addEventListener('dragend', onDragEnd);
    el.querySelector('.task-name').addEventListener('dblclick', e => {
      e.stopPropagation();
      const taskId = parseInt(el.dataset.taskId);
      const task = tasks.find(t => t.id === taskId);
      if (task) startRename(e.currentTarget, task);
    });
    el.querySelector('.task-weeks').addEventListener('click', e => {
      e.stopPropagation();
      const taskId = parseInt(el.dataset.taskId);
      const task = tasks.find(t => t.id === taskId);
      if (task) showWeeksDropdown(e.currentTarget, task);
    });
    el.querySelector('.bank-color-dot').addEventListener('click', e => {
      e.stopPropagation();
      const taskId = parseInt(el.dataset.taskId);
      const task = tasks.find(t => t.id === taskId);
      if (task) showColorDropdown(e.currentTarget, task);
    });
    el.querySelector('.category-badge').addEventListener('click', e => {
      e.stopPropagation();
      const taskId = parseInt(el.dataset.taskId);
      const task = tasks.find(t => t.id === taskId);
      if (task) showCategoryDropdown(e.currentTarget, task);
    });
  });

  $taskBank.querySelectorAll('.delete-task').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      tasks = tasks.filter(t => t.id !== parseInt(el.dataset.taskId));
      renderTaskBank();
    });
  });
}

/* ── Render Gantt rows ── */
function renderGantt() {
  $ganttBody.innerHTML = '';
  chartRows.forEach((row, rowIdx) => {
    const $row = document.createElement('div');
    $row.className = 'gantt-row';
    $row.dataset.rowIdx = rowIdx;

    const $label = document.createElement('div');
    $label.className = 'row-label';
    $label.innerHTML = `
      <span class="drag-handle" draggable="true" title="Drag to reorder">⠿</span>
      <span class="row-color-dot" style="background:${row.task.color};"></span>
      <span class="row-name-group">
        <span class="category-badge ${row.task.category ? '' : 'no-cat'}" data-task-id="${row.task.id}" title="Change tag">${row.task.category ? escHtml(row.task.category) : '+ tag'}</span>
        <span class="row-task-name">${escHtml(row.task.name)}</span>
      </span>
      <span class="row-weeks">${row.task.weeks}w</span>
      <button class="remove-row-btn" title="Remove from chart">&times;</button>
    `;
    $label.querySelector('.remove-row-btn').addEventListener('click', () => {
      row.task.placed = false;
      row.task.startWeek = null;
      chartRows.splice(rowIdx, 1);
      renderGantt();
      renderTaskBank();
    });

    $label.querySelector('.row-color-dot').addEventListener('click', e => {
      e.stopPropagation();
      showColorDropdown(e.currentTarget, row.task);
    });

    $label.querySelector('.row-task-name').addEventListener('dblclick', e => {
      startRename(e.currentTarget, row.task);
    });

    $label.querySelector('.row-weeks').addEventListener('click', e => {
      e.stopPropagation();
      showWeeksDropdown(e.currentTarget, row.task);
    });

    $label.querySelector('.category-badge').addEventListener('click', e => {
      e.stopPropagation();
      showCategoryDropdown(e.currentTarget, row.task);
    });

    const handle = $label.querySelector('.drag-handle');
    handle.addEventListener('dragstart', e => {
      e.stopPropagation();
      rowDragIdx = rowIdx;
      dragData = { source: 'reorder', taskId: row.task.id, rowIdx };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
      requestAnimationFrame(() => $row.classList.add('row-dragging'));
    });
    handle.addEventListener('dragend', () => {
      rowDragIdx = null;
      dragData = null;
      removeGhostRow();
      document.querySelectorAll('.row-dragging, .row-drop-above, .row-drop-below')
        .forEach(el => el.classList.remove('row-dragging', 'row-drop-above', 'row-drop-below'));
    });

    $row.addEventListener('dragover', e => {
      if (!dragData || (dragData.source !== 'reorder' && dragData.source !== 'chart')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const task = tasks.find(t => t.id === dragData.taskId);
      if (!task) return;
      const rect = $row.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const insertIdx = e.clientY < mid ? rowIdx : rowIdx + 1;
      if (insertIdx === rowDragIdx || insertIdx === rowDragIdx + 1) {
        removeGhostRow();
        if (dragData.source === 'chart') {
          const origRow = $ganttBody.querySelector(`.gantt-row[data-row-idx="${dragData.rowIdx}"]`);
          if (origRow) origRow.classList.remove('row-dragging');
        }
        return;
      }
      if (dragData.source === 'chart') {
        const origRow = $ganttBody.querySelector(`.gantt-row[data-row-idx="${dragData.rowIdx}"]`);
        if (origRow) origRow.classList.add('row-dragging');
      }
      const startWi = task.startWeek !== null ? task.startWeek : 0;
      showGhostRow(task, insertIdx, startWi);
    });

    $row.addEventListener('dragleave', () => {
      $row.classList.remove('row-drop-above', 'row-drop-below');
    });

    $row.addEventListener('drop', e => {
      if (!dragData || (dragData.source !== 'reorder' && dragData.source !== 'chart')) return;
      e.preventDefault();
      e.stopPropagation();
      const savedGhostIdx = ghostInsertIdx;
      const savedStartWi = ghostStartWi;
      removeGhostRow();
      const task = tasks.find(t => t.id === dragData.taskId);
      const origIdx = dragData.rowIdx;
      if (dragData.source === 'chart' && task) {
        task.startWeek = savedStartWi >= 0 ? savedStartWi : (task.startWeek || 0);
      }
      if (savedGhostIdx >= 0 && savedGhostIdx !== origIdx && savedGhostIdx !== origIdx + 1) {
        const [moved] = chartRows.splice(origIdx, 1);
        const insertAt = savedGhostIdx > origIdx ? savedGhostIdx - 1 : savedGhostIdx;
        chartRows.splice(insertAt, 0, moved);
      }
      rowDragIdx = null;
      dragData = null;
      renderGantt();
    });

    const $cells = document.createElement('div');
    $cells.className = 'row-cells';

    weeks.forEach((w, wi) => {
      const $cell = document.createElement('div');
      $cell.className = 'week-cell' + (isCurrentWeek(w) ? ' today-col' : '');
      $cell.dataset.week = wi;
      $cell.dataset.rowIdx = rowIdx;
      $cells.appendChild($cell);
    });

    if (row.task.startWeek !== null && row.task.startWeek !== undefined) {
      const bar = createTaskBar(row.task, rowIdx);
      $cells.appendChild(bar);
    }

    $cells.addEventListener('dragover', onRowDragOver);
    $cells.addEventListener('dragleave', onRowDragLeave);
    $cells.addEventListener('drop', e => onRowDrop(e, rowIdx));

    $row.appendChild($label);
    $row.appendChild($cells);
    $ganttBody.appendChild($row);
  });
  recordUndo();
  applyPhaseFilter();
}

function createTaskBar(task, rowIdx) {
  const hasSegs = task.segments && task.segments.length;
  const bar = document.createElement('div');
  bar.className = 'task-bar' + (hasSegs ? ' segmented' : '');
  bar.style.background = task.color;
  bar.style.left = `calc(${task.startWeek} * (100% / ${weeks.length}))`;
  bar.style.width = `calc(${task.weeks} * (100% / ${weeks.length}) - 4px)`;
  bar.draggable = true;
  bar.dataset.taskId = task.id;
  bar.dataset.rowIdx = rowIdx;

  if (hasSegs) {
    let cumWeeks = 0;
    task.segments.forEach((seg, si) => {
      if (si > 0) {
        const divider = document.createElement('div');
        divider.className = 'segment-divider';
        divider.style.left = `calc(${cumWeeks / task.weeks} * (100% + 4px))`;
        divider.addEventListener('mousedown', e => onDividerResize(e, task, si - 1));
        bar.appendChild(divider);
      }
      const segDiv = document.createElement('div');
      segDiv.className = 'segment';
      segDiv.style.left = `calc(${cumWeeks / task.weeks} * (100% + 4px))`;
      if (si < task.segments.length - 1) {
        segDiv.style.width = `calc(${seg.weeks / task.weeks} * (100% + 4px))`;
      } else {
        segDiv.style.right = '0';
      }
      segDiv.style.background = getSegShade(task, si, task.segments.length);
      cumWeeks += seg.weeks;
      const segLabel = document.createElement('span');
      segLabel.className = 'seg-label';
      segLabel.textContent = seg.label;
      segDiv.appendChild(segLabel);
      segLabel.addEventListener('dblclick', e => {
        e.stopPropagation();
        bar.draggable = false;
        startSegmentRename(segLabel, task, si, () => { bar.draggable = true; });
      });
      segDiv.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        showSegmentMenu(e, task, si, rowIdx);
      });
      bar.appendChild(segDiv);
    });
  }

  const barLabel = document.createElement('span');
  barLabel.className = 'bar-label';
  barLabel.textContent = task.phase || '';
  bar.appendChild(barLabel);

  bar.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (hasSegs) {
      const segments = bar.querySelectorAll('.segment');
      let closestIdx = 0;
      let closestDist = Infinity;
      segments.forEach((s, i) => {
        const r = s.getBoundingClientRect();
        const center = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - center);
        if (dist < closestDist) { closestDist = dist; closestIdx = i; }
      });
      showSegmentMenu(e, task, closestIdx, rowIdx);
    } else {
      showSegmentMenu(e, task, -1, rowIdx);
    }
  });

  bar.addEventListener('dragstart', onBarDragStart);
  bar.addEventListener('dragend', onDragEnd);

  const leftHandle = document.createElement('div');
  leftHandle.className = 'resize-handle left';
  leftHandle.addEventListener('mousedown', e => onResizeStart(e, task, 'left'));

  const rightHandle = document.createElement('div');
  rightHandle.className = 'resize-handle right';
  rightHandle.addEventListener('mousedown', e => onResizeStart(e, task, 'right'));

  bar.appendChild(leftHandle);
  bar.appendChild(rightHandle);

  return bar;
}

function startSegmentRename(el, task, segIdx, onDone) {
  const seg = task.segments[segIdx];
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.value = seg.label;
  input.style.fontSize = '10px';
  input.style.textAlign = 'center';

  const original = el.textContent;
  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const val = input.value.trim();
    if (val && val !== seg.label) {
      seg.label = val;
      renderGantt();
    } else {
      el.textContent = original;
    }
    if (onDone) onDone();
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = original; input.blur(); }
  });
  input.addEventListener('mousedown', e => e.stopPropagation());
  input.addEventListener('dragstart', e => e.preventDefault());
}

function closeSegmentMenu() {
  const existing = document.getElementById('segmentMenu');
  if (existing) existing.remove();
}

function positionSubmenu(wrapper, sub) {
  wrapper.addEventListener('mouseenter', () => {
    const wr = wrapper.getBoundingClientRect();
    let left = wr.right;
    let top = wr.top;
    sub.style.left = left + 'px';
    sub.style.top = top + 'px';
    requestAnimationFrame(() => {
      const sr = sub.getBoundingClientRect();
      if (sr.right > window.innerWidth) left = wr.left - sr.width;
      if (sr.bottom > window.innerHeight) top = window.innerHeight - sr.height - 8;
      sub.style.left = left + 'px';
      sub.style.top = top + 'px';
    });
  });
}

function showSegmentMenu(e, task, segIdx, rowIdx) {
  closeSegmentMenu();
  const menu = document.createElement('div');
  menu.className = 'segment-menu';
  menu.id = 'segmentMenu';

  // Compute split week at right-click time so scroll changes don't affect it
  const rowCells = document.querySelector(`.gantt-row[data-row-idx="${rowIdx}"] .row-cells`);
  let splitWeek = Math.floor(task.weeks / 2);
  if (rowCells) {
    const rect = rowCells.getBoundingClientRect();
    const cellWidth = rect.width / weeks.length;
    const clickWeek = Math.floor((e.clientX - rect.left) / cellWidth);
    splitWeek = Math.max(1, Math.min(clickWeek - task.startWeek, task.weeks - 1));
  }

  if (segIdx === -1) {
    if (task.weeks >= 2) {
      const splitItem = document.createElement('div');
      splitItem.className = 'menu-item';
      splitItem.textContent = `Split at week ${splitWeek} / ${task.weeks}`;
      splitItem.addEventListener('click', () => {
        closeSegmentMenu();
        task.segments = [
          { label: '', color: task.color, weeks: splitWeek },
          { label: '', color: task.color, weeks: task.weeks - splitWeek },
        ];
        renderGantt();
      });
      menu.appendChild(splitItem);
    }

    const divider = document.createElement('div');
    divider.className = 'menu-divider';
    menu.appendChild(divider);

    const lbl = document.createElement('div');
    lbl.className = 'menu-label';
    lbl.textContent = 'Set phase';
    menu.appendChild(lbl);

    PHASE_TYPES.forEach(phase => {
      if (phase.subOptions) {
        const wrapper = document.createElement('div');
        wrapper.className = 'menu-item has-submenu';
        wrapper.textContent = phase.label + ' ▸';
        const sub = document.createElement('div');
        sub.className = 'context-submenu';
        const baseItem = document.createElement('div');
        baseItem.className = 'menu-item';
        baseItem.textContent = phase.label;
        baseItem.addEventListener('click', () => {
          closeSegmentMenu();
          task.phase = phase.label;
          renderGantt();
        });
        sub.appendChild(baseItem);
        const subDiv = document.createElement('div');
        subDiv.className = 'menu-divider';
        sub.appendChild(subDiv);
        phase.subOptions.forEach(opt => {
          const si = document.createElement('div');
          si.className = 'menu-item';
          si.textContent = 'Eng: ' + opt;
          si.addEventListener('click', () => {
            closeSegmentMenu();
            task.phase = 'Eng: ' + opt;
            renderGantt();
          });
          sub.appendChild(si);
        });
        wrapper.appendChild(sub);
        positionSubmenu(wrapper, sub);
        menu.appendChild(wrapper);
      } else {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.textContent = phase.label;
        item.addEventListener('click', () => {
          closeSegmentMenu();
          task.phase = phase.label;
          renderGantt();
        });
        menu.appendChild(item);
      }
    });

    if (task.phase) {
      const clearItem = document.createElement('div');
      clearItem.className = 'menu-item';
      clearItem.textContent = '✕ Clear phase';
      clearItem.addEventListener('click', () => {
        closeSegmentMenu();
        delete task.phase;
        renderGantt();
      });
      menu.appendChild(clearItem);
    }
  } else {
    const seg = task.segments[segIdx];

    if (seg.weeks >= 2) {
      let segSplitAt = Math.floor(seg.weeks / 2);
      if (rowCells) {
        let segStartWeek = task.startWeek;
        for (let i = 0; i < segIdx; i++) segStartWeek += task.segments[i].weeks;
        const rect = rowCells.getBoundingClientRect();
        const cellWidth = rect.width / weeks.length;
        const clickWeek = Math.floor((e.clientX - rect.left) / cellWidth);
        segSplitAt = Math.max(1, Math.min(clickWeek - segStartWeek, seg.weeks - 1));
      }
      const splitItem = document.createElement('div');
      splitItem.className = 'menu-item';
      splitItem.textContent = `Split at week ${segSplitAt} / ${seg.weeks}`;
      splitItem.addEventListener('click', () => {
        closeSegmentMenu();
        const newSeg = {
          label: '',
          color: seg.color,
          weeks: seg.weeks - segSplitAt,
        };
        seg.weeks = segSplitAt;
        task.segments.splice(segIdx + 1, 0, newSeg);
        renderGantt();
      });
      menu.appendChild(splitItem);
    }

    if (task.segments.length > 1) {
      const removeItem = document.createElement('div');
      removeItem.className = 'menu-item';
      removeItem.textContent = '✕ Remove segment';
      removeItem.addEventListener('click', () => {
        closeSegmentMenu();
        const removedWeeks = seg.weeks;
        task.segments.splice(segIdx, 1);
        const neighbor = segIdx < task.segments.length
          ? task.segments[segIdx]
          : task.segments[segIdx - 1];
        neighbor.weeks += removedWeeks;
        if (task.segments.length === 1) {
          task.color = task.segments[0].color;
          delete task.segments;
        }
        renderGantt();
      });
      menu.appendChild(removeItem);
    }

    const divider = document.createElement('div');
    divider.className = 'menu-divider';
    menu.appendChild(divider);

    const lbl = document.createElement('div');
    lbl.className = 'menu-label';
    lbl.textContent = 'Set phase type';
    menu.appendChild(lbl);

    PHASE_TYPES.forEach(phase => {
      if (phase.subOptions) {
        const wrapper = document.createElement('div');
        wrapper.className = 'menu-item has-submenu';
        wrapper.textContent = phase.label + ' ▸';
        const sub = document.createElement('div');
        sub.className = 'context-submenu';
        const baseItem = document.createElement('div');
        baseItem.className = 'menu-item';
        baseItem.textContent = phase.label;
        baseItem.addEventListener('click', () => {
          closeSegmentMenu();
          seg.label = phase.label;
          seg.color = phase.color;
          renderGantt();
        });
        sub.appendChild(baseItem);
        const subDiv = document.createElement('div');
        subDiv.className = 'menu-divider';
        sub.appendChild(subDiv);
        phase.subOptions.forEach(opt => {
          const si = document.createElement('div');
          si.className = 'menu-item';
          si.textContent = 'Eng: ' + opt;
          si.addEventListener('click', () => {
            closeSegmentMenu();
            seg.label = 'Eng: ' + opt;
            seg.color = phase.color;
            renderGantt();
          });
          sub.appendChild(si);
        });
        wrapper.appendChild(sub);
        positionSubmenu(wrapper, sub);
        menu.appendChild(wrapper);
      } else {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.textContent = phase.label;
        item.addEventListener('click', () => {
          closeSegmentMenu();
          seg.label = phase.label;
          seg.color = phase.color;
          renderGantt();
        });
        menu.appendChild(item);
      }
    });
  }

  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  document.body.appendChild(menu);

  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
    if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  });

  setTimeout(() => {
    const closeFn = ev => {
      if (!menu.contains(ev.target)) {
        closeSegmentMenu();
        document.removeEventListener('click', closeFn);
      }
    };
    document.addEventListener('click', closeFn);
  }, 0);
}

function onDividerResize(e, task, dividerIdx) {
  e.preventDefault();
  e.stopPropagation();

  const rowCells = e.target.closest('.row-cells');
  const rect = rowCells.getBoundingClientRect();
  const cellWidth = rect.width / weeks.length;

  const leftSeg = task.segments[dividerIdx];
  const rightSeg = task.segments[dividerIdx + 1];
  const totalWeeks = leftSeg.weeks + rightSeg.weeks;

  let segStart = task.startWeek;
  for (let i = 0; i < dividerIdx; i++) segStart += task.segments[i].weeks;

  const onMouseMove = ev => {
    const x = ev.clientX - rect.left;
    const hoverWeek = Math.max(0, Math.min(weeks.length - 1, Math.floor(x / cellWidth)));
    const newLeftWeeks = hoverWeek - segStart;
    const newRightWeeks = totalWeeks - newLeftWeeks;
    if (newLeftWeeks >= 1 && newRightWeeks >= 1 && leftSeg.weeks !== newLeftWeeks) {
      leftSeg.weeks = newLeftWeeks;
      rightSeg.weeks = newRightWeeks;
      renderGantt();
    }
  };

  const onMouseUp = () => {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  };

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

/* ── Drag from bank ── */
let dragData = null;
let rowDragIdx = null;
let ghostRow = null;
let ghostInsertIdx = -1;
let ghostBar = null;
let ghostStartWi = -1;

function removeGhostRow() {
  if (ghostRow) { ghostRow.remove(); ghostRow = null; ghostBar = null; }
  ghostInsertIdx = -1;
  ghostStartWi = -1;
}

function showGhostRow(task, insertIdx, startWi) {
  ghostStartWi = startWi;
  if (ghostInsertIdx === insertIdx) {
    if (ghostBar) {
      ghostBar.style.left = `calc(${startWi} * (100% / ${weeks.length}))`;
      ghostBar.style.width = `calc(${task.weeks} * (100% / ${weeks.length}) - 4px)`;
    }
    return;
  }

  removeGhostRow();
  ghostInsertIdx = insertIdx;

  const row = document.createElement('div');
  row.className = 'gantt-row ghost-row';

  const label = document.createElement('div');
  label.className = 'row-label';
  label.innerHTML = `
    <span style="width:14px;flex-shrink:0"></span>
    <span class="row-color-dot" style="background:${task.color};"></span>
    <span class="row-name-group">
      <span class="row-task-name">${escHtml(task.name)}</span>
    </span>
    <span class="row-weeks">${task.weeks}w</span>
  `;

  const cellsDiv = document.createElement('div');
  cellsDiv.className = 'row-cells';
  weeks.forEach(() => {
    const cell = document.createElement('div');
    cell.className = 'week-cell';
    cellsDiv.appendChild(cell);
  });

  const bar = document.createElement('div');
  const hasSegs = task.segments && task.segments.length;
  bar.className = 'task-bar' + (hasSegs ? ' segmented' : '');
  bar.style.background = task.color;
  bar.style.left = `calc(${startWi} * (100% / ${weeks.length}))`;
  bar.style.width = `calc(${task.weeks} * (100% / ${weeks.length}) - 4px)`;
  if (hasSegs) {
    let cumW = 0;
    task.segments.forEach((seg, si) => {
      if (si > 0) {
        const d = document.createElement('div');
        d.className = 'segment-divider';
        d.style.left = `calc(${cumW / task.weeks} * (100% + 4px))`;
        bar.appendChild(d);
      }
      const s = document.createElement('div');
      s.className = 'segment';
      s.style.left = `calc(${cumW / task.weeks} * (100% + 4px))`;
      if (si < task.segments.length - 1) {
        s.style.width = `calc(${seg.weeks / task.weeks} * (100% + 4px))`;
      } else {
        s.style.right = '0';
      }
      s.style.background = getSegShade(task, si, task.segments.length);
      const l = document.createElement('span');
      l.className = 'seg-label';
      l.textContent = seg.label;
      s.appendChild(l);
      bar.appendChild(s);
      cumW += seg.weeks;
    });
  }
  const barLabel = document.createElement('span');
  barLabel.className = 'bar-label';
  barLabel.textContent = task.phase || '';
  bar.appendChild(barLabel);
  cellsDiv.appendChild(bar);

  row.appendChild(label);
  row.appendChild(cellsDiv);
  ghostRow = row;
  ghostBar = bar;

  const allRows = [...$ganttBody.querySelectorAll('.gantt-row:not(.ghost-row)')];
  if (insertIdx < allRows.length) {
    $ganttBody.insertBefore(row, allRows[insertIdx]);
  } else {
    $ganttBody.appendChild(row);
  }
}

function onBankDragStart(e) {
  const id = parseInt(e.currentTarget.dataset.taskId);
  const task = tasks.find(t => t.id === id);
  if (task && task.weeks > weeks.length) {
    e.preventDefault();
    showToast(`"${task.name}" is ${task.weeks}w but the chart only has ${weeks.length} weeks`);
    return;
  }
  dragData = { source: 'bank', taskId: id };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  e.currentTarget.classList.add('dragging');

  const refCell = document.querySelector('.week-cell');
  if (refCell && task) {
    const cellWidth = refCell.getBoundingClientRect().width;
    const ghost = document.createElement('div');
    ghost.style.cssText = `
      position: fixed; left: -9999px; top: -9999px;
      width: ${task.weeks * cellWidth - 4}px;
      height: 32px;
      background: ${task.color};
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      opacity: 0.85;
      box-sizing: border-box;
    `;
    ghost.textContent = task.name;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, (task.weeks * cellWidth - 4) / 2, 16);
    requestAnimationFrame(() => ghost.remove());
  }
}

function onBarDragStart(e) {
  e.stopPropagation();
  const id = parseInt(e.currentTarget.dataset.taskId);
  const rowIdx = parseInt(e.currentTarget.dataset.rowIdx);
  const task = tasks.find(t => t.id === id);
  const rowCells = e.currentTarget.closest('.row-cells');
  const rect = rowCells.getBoundingClientRect();
  const cellWidth = rect.width / weeks.length;
  const grabOffset = Math.floor((e.clientX - rect.left - task.startWeek * cellWidth) / cellWidth);
  dragData = { source: 'chart', taskId: id, rowIdx, grabOffset: Math.max(0, grabOffset) };
  rowDragIdx = rowIdx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  e.currentTarget.style.opacity = '0.4';
}

function onDragEnd(e) {
  dragData = null;
  rowDragIdx = null;
  removeGhostRow();
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drag-over-add').forEach(el => el.classList.remove('drag-over-add'));
  document.querySelectorAll('.row-dragging').forEach(el => el.classList.remove('row-dragging'));
  e.currentTarget.style.opacity = '';
}

function getWeekFromX(e, container) {
  const rect = container.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const cellWidth = rect.width / weeks.length;
  return Math.max(0, Math.min(weeks.length - 1, Math.floor(x / cellWidth)));
}

function getDropStartWeek(e, container) {
  const raw = getWeekFromX(e, container);
  if (!dragData) return raw;
  const task = tasks.find(t => t.id === dragData.taskId);
  if (!task) return raw;
  const offset = dragData.grabOffset || 0;
  const startWi = Math.max(0, raw - offset);
  return Math.min(startWi, weeks.length - task.weeks);
}

function highlightWeekSpan(cells, startWi, taskWeeks) {
  cells.forEach(c => c.classList.remove('drag-over'));
  for (let i = startWi; i < startWi + taskWeeks && i < weeks.length; i++) {
    if (cells[i]) cells[i].classList.add('drag-over');
  }
}

function onRowDragOver(e) {
  if (!dragData) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  const $row = e.currentTarget.closest('.gantt-row');
  const cells = e.currentTarget.querySelectorAll('.week-cell');
  cells.forEach(c => c.classList.remove('drag-over'));

  const task = tasks.find(t => t.id === dragData.taskId);
  if (!task) return;

  if (dragData.source === 'bank') {
    const rect = $row.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const rowIdx = parseInt($row.dataset.rowIdx);
    const insertIdx = e.clientY < mid ? rowIdx : rowIdx + 1;
    const wi = getWeekFromX(e, e.currentTarget);
    const startWi = Math.max(0, Math.min(wi, weeks.length - task.weeks));
    showGhostRow(task, insertIdx, startWi);
  } else if (dragData.source === 'chart') {
    e.stopPropagation();
    const currentRowIdx = parseInt($row.dataset.rowIdx);
    const rect = $row.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const insertIdx = e.clientY < mid ? currentRowIdx : currentRowIdx + 1;
    const startWi = getDropStartWeek(e, e.currentTarget);

    if (insertIdx === rowDragIdx || insertIdx === rowDragIdx + 1) {
      removeGhostRow();
      const origRow = $ganttBody.querySelector(`.gantt-row[data-row-idx="${dragData.rowIdx}"]`);
      if (origRow) origRow.classList.remove('row-dragging');
      highlightWeekSpan(cells, startWi, task.weeks);
    } else {
      const origRow = $ganttBody.querySelector(`.gantt-row[data-row-idx="${dragData.rowIdx}"]`);
      if (origRow) origRow.classList.add('row-dragging');
      showGhostRow(task, insertIdx, startWi);
    }
  } else if (dragData.source === 'reorder') {
    e.stopPropagation();
    const currentRowIdx = parseInt($row.dataset.rowIdx);
    const rect = $row.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const insertIdx = e.clientY < mid ? currentRowIdx : currentRowIdx + 1;

    if (insertIdx === rowDragIdx || insertIdx === rowDragIdx + 1) {
      removeGhostRow();
      return;
    }
    const startWi = task.startWeek !== null ? task.startWeek : 0;
    showGhostRow(task, insertIdx, startWi);
  }
}

function onRowDragLeave(e) {
  e.currentTarget.querySelectorAll('.week-cell').forEach(c => c.classList.remove('drag-over'));
}

function onRowDrop(e, rowIdx) {
  e.preventDefault();

  if (dragData && (dragData.source === 'reorder' || dragData.source === 'chart')) {
    e.stopPropagation();
    const savedGhostIdx = ghostInsertIdx;
    const savedStartWi = ghostStartWi;
    removeGhostRow();

    const task = tasks.find(t => t.id === dragData.taskId);
    if (!task) { rowDragIdx = null; dragData = null; renderGantt(); return; }
    const origIdx = dragData.rowIdx;

    if (dragData.source === 'chart') {
      const startWi = savedGhostIdx >= 0 && savedStartWi >= 0
        ? savedStartWi
        : getDropStartWeek(e, e.currentTarget);
      if (startWi + task.weeks > weeks.length) {
        showToast(`Not enough room — task needs ${task.weeks}w but only ${weeks.length - startWi} left`);
        rowDragIdx = null; dragData = null; renderGantt(); return;
      }
      task.startWeek = startWi;
    }

    if (savedGhostIdx >= 0 && savedGhostIdx !== origIdx && savedGhostIdx !== origIdx + 1) {
      const [moved] = chartRows.splice(origIdx, 1);
      const insertAt = savedGhostIdx > origIdx ? savedGhostIdx - 1 : savedGhostIdx;
      chartRows.splice(insertAt, 0, moved);
    }

    rowDragIdx = null;
    dragData = null;
    renderGantt();
    return;
  }

  const savedGhostIdx = ghostInsertIdx;
  removeGhostRow();
  if (!dragData) return;

  const task = tasks.find(t => t.id === dragData.taskId);
  if (!task) return;

  const raw = getWeekFromX(e, e.currentTarget);
  const startWi = Math.max(0, Math.min(raw, weeks.length - task.weeks));

  if (startWi + task.weeks > weeks.length) {
    showToast(`Not enough room — task needs ${task.weeks}w but only ${weeks.length - startWi} left`);
    dragData = null;
    return;
  }

  if (dragData.source === 'bank') {
    const insertIdx = savedGhostIdx >= 0 ? savedGhostIdx : rowIdx;
    task.placed = true;
    task.startWeek = startWi;
    chartRows.splice(insertIdx, 0, { task });
  }

  dragData = null;
  renderGantt();
  renderTaskBank();
}

/* ── Ghost-row fallback: events pass through pointer-events:none ghost to ganttBody ── */
$ganttBody.addEventListener('dragover', e => {
  if (!ghostRow || !dragData) return;
  if (dragData.source !== 'bank' && dragData.source !== 'chart' && dragData.source !== 'reorder') return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const task = tasks.find(t => t.id === dragData.taskId);
  if (task && ghostBar && dragData.source !== 'reorder') {
    const rowCells = ghostRow.querySelector('.row-cells');
    if (rowCells) {
      const rect = rowCells.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const cellWidth = rect.width / weeks.length;
      let wi;
      if (dragData.source === 'chart') {
        const offset = dragData.grabOffset || 0;
        wi = Math.max(0, Math.floor(x / cellWidth) - offset);
      } else {
        wi = Math.max(0, Math.min(weeks.length - 1, Math.floor(x / cellWidth)));
      }
      const startWi = Math.max(0, Math.min(wi, weeks.length - task.weeks));
      ghostBar.style.left = `calc(${startWi} * (100% / ${weeks.length}))`;
      ghostBar.style.width = `calc(${task.weeks} * (100% / ${weeks.length}) - 4px)`;
      ghostStartWi = startWi;
    }
  }
});

$ganttBody.addEventListener('drop', e => {
  if (ghostInsertIdx < 0 || !dragData) return;

  if (dragData.source === 'chart' || dragData.source === 'reorder') {
    e.preventDefault();
    const task = tasks.find(t => t.id === dragData.taskId);
    if (!task) { removeGhostRow(); rowDragIdx = null; dragData = null; renderGantt(); return; }
    const origIdx = dragData.rowIdx;
    const insertIdx = ghostInsertIdx;
    const savedStartWi = ghostStartWi;
    removeGhostRow();

    if (dragData.source === 'chart') {
      const startWi = savedStartWi >= 0 ? savedStartWi : (task.startWeek || 0);
      if (startWi + task.weeks > weeks.length) {
        showToast(`Not enough room — task needs ${task.weeks}w but only ${weeks.length - startWi} left`);
        rowDragIdx = null; dragData = null; renderGantt(); return;
      }
      task.startWeek = startWi;
    }

    if (insertIdx !== origIdx && insertIdx !== origIdx + 1) {
      const [moved] = chartRows.splice(origIdx, 1);
      const insertAt = insertIdx > origIdx ? insertIdx - 1 : insertIdx;
      chartRows.splice(insertAt, 0, moved);
    }

    rowDragIdx = null; dragData = null;
    renderGantt(); renderTaskBank();
    return;
  }

  if (dragData.source !== 'bank') return;
  e.preventDefault();
  const task = tasks.find(t => t.id === dragData.taskId);
  if (!task) { removeGhostRow(); dragData = null; return; }

  const rowCells = ghostRow ? ghostRow.querySelector('.row-cells') : null;
  let startWi = 0;
  if (rowCells) {
    const rect = rowCells.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const cellWidth = rect.width / weeks.length;
    const wi = Math.max(0, Math.min(weeks.length - 1, Math.floor(x / cellWidth)));
    startWi = Math.max(0, Math.min(wi, weeks.length - task.weeks));
  }

  const insertIdx = ghostInsertIdx;
  removeGhostRow();

  if (startWi + task.weeks > weeks.length) {
    showToast(`Not enough room — task needs ${task.weeks}w but only ${weeks.length - startWi} left`);
    dragData = null;
    return;
  }

  task.placed = true;
  task.startWeek = startWi;
  chartRows.splice(insertIdx, 0, { task });
  dragData = null;
  renderGantt();
  renderTaskBank();
});

/* ── Drop on add-row zone ── */
$ganttAddRow.addEventListener('dragover', e => {
  e.preventDefault();
  if (dragData && (dragData.source === 'reorder' || dragData.source === 'chart')) {
    const task = tasks.find(t => t.id === dragData.taskId);
    if (task) {
      if (dragData.source === 'chart') {
        const origRow = $ganttBody.querySelector(`.gantt-row[data-row-idx="${dragData.rowIdx}"]`);
        if (origRow) origRow.classList.add('row-dragging');
      }
      const startWi = task.startWeek !== null ? task.startWeek : 0;
      showGhostRow(task, chartRows.length, startWi);
    }
  } else if (dragData && dragData.source === 'bank') {
    removeGhostRow();
    $ganttAddRow.classList.add('drag-over-add');
  }
});

$ganttAddRow.addEventListener('dragleave', () => {
  $ganttAddRow.classList.remove('drag-over-add');
});

$ganttAddRow.addEventListener('drop', e => {
  e.preventDefault();
  $ganttAddRow.classList.remove('drag-over-add');

  if (dragData && (dragData.source === 'reorder' || dragData.source === 'chart')) {
    const savedGhostIdx = ghostInsertIdx;
    const savedStartWi = ghostStartWi;
    removeGhostRow();
    const task = tasks.find(t => t.id === dragData.taskId);
    if (!task) { rowDragIdx = null; dragData = null; renderGantt(); return; }
    const origIdx = dragData.rowIdx;
    if (dragData.source === 'chart') {
      task.startWeek = savedStartWi >= 0 ? savedStartWi : (task.startWeek || 0);
    }
    if (savedGhostIdx >= 0 && savedGhostIdx !== origIdx && savedGhostIdx !== origIdx + 1) {
      const [moved] = chartRows.splice(origIdx, 1);
      const insertAt = savedGhostIdx > origIdx ? savedGhostIdx - 1 : savedGhostIdx;
      chartRows.splice(insertAt, 0, moved);
    }
    rowDragIdx = null; dragData = null;
    renderGantt();
    return;
  }

  if (!dragData || dragData.source !== 'bank') return;

  const task = tasks.find(t => t.id === dragData.taskId);
  if (!task) return;

  if (task.weeks > weeks.length) {
    showToast(`Not enough room — task needs ${task.weeks}w but chart has ${weeks.length}`);
    dragData = null;
    return;
  }

  task.placed = true;
  task.startWeek = 0;
  chartRows.push({ task });

  dragData = null;
  renderGantt();
  renderTaskBank();
});

/* ── Resize handles ── */
function onResizeStart(e, task, side) {
  e.preventDefault();
  e.stopPropagation();

  const rowCells = e.target.closest('.row-cells');
  const rect = rowCells.getBoundingClientRect();
  const cellWidth = rect.width / weeks.length;
  const hasSegs = task.segments && task.segments.length;

  const onMouseMove = (ev) => {
    const x = ev.clientX - rect.left;
    const hoverWeek = Math.max(0, Math.min(weeks.length - 1, Math.floor(x / cellWidth)));

    if (side === 'right') {
      const newWeeks = hoverWeek - task.startWeek + 1;
      if (newWeeks >= 1 && task.startWeek + newWeeks <= weeks.length) {
        if (task.weeks !== newWeeks) {
          const delta = newWeeks - task.weeks;
          if (hasSegs) {
            const last = task.segments[task.segments.length - 1];
            if (last.weeks + delta < 1) return;
            last.weeks += delta;
          }
          task.weeks = newWeeks;
          renderGantt();
        }
      }
    } else {
      const endWeek = task.startWeek + task.weeks - 1;
      if (hoverWeek >= 0 && hoverWeek <= endWeek) {
        const newWeeks = endWeek - hoverWeek + 1;
        if (task.weeks !== newWeeks || task.startWeek !== hoverWeek) {
          const delta = newWeeks - task.weeks;
          if (hasSegs) {
            const first = task.segments[0];
            if (first.weeks + delta < 1) return;
            first.weeks += delta;
          }
          task.weeks = newWeeks;
          task.startWeek = hoverWeek;
          renderGantt();
        }
      }
    }
  };

  const onMouseUp = () => {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  };

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

/* ── Add task form ── */
document.getElementById('newTaskForm').addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('taskName').value.trim();
  const numWeeks = parseInt(document.getElementById('taskWeeks').value);
  if (!name) return;

  const cat = document.getElementById('taskCategory').value || null;

  tasks.push({
    id: nextId++,
    name,
    weeks: numWeeks,
    color: selectedColor,
    category: cat,
    placed: false,
    startWeek: null,
  });

  document.getElementById('taskName').value = '';
  renderTaskBank();
  showToast(`"${name}" added to task bank`);
});

/* ── Date controls ── */
function applyDates() {
  const s = $startDate.value;
  const e = $endDate.value;
  if (!s || !e) return;
  weeks = buildWeeks(new Date(s + 'T00:00:00'), new Date(e + 'T00:00:00'));
  const removed = [];
  chartRows = chartRows.filter(row => {
    const t = row.task;
    if (t.startWeek === null) return true;
    const endWeek = t.startWeek + t.weeks - 1;
    if (t.startWeek >= weeks.length || endWeek >= weeks.length) {
      t.placed = false;
      t.startWeek = null;
      removed.push(t.name);
      return false;
    }
    return true;
  });
  if (removed.length) {
    showToast(`Moved ${removed.length} task${removed.length > 1 ? 's' : ''} back to bank (out of range)`);
  }
  renderHeaders();
  renderTaskBank();
  renderGantt();
  renderNotes();
  syncStickyOffsets();
}

/* ── Quarter / Year selectors ── */
const $quarterSelect = document.getElementById('quarterSelect');
const $yearSelect = document.getElementById('yearSelect');
let dateMode = 'quarter';

(function populateYearSelect() {
  const currentYear = new Date().getFullYear();
  for (let y = currentYear - 2; y <= currentYear + 3; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    $yearSelect.appendChild(opt);
  }
  $quarterSelect.value = Math.floor(new Date().getMonth() / 3) + 1;
})();

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dateMode = btn.dataset.mode;
    document.getElementById('panelQuarter').style.display = dateMode === 'quarter' ? 'flex' : 'none';
    document.getElementById('panelCustom').style.display = dateMode === 'custom' ? 'flex' : 'none';
  });
});

document.getElementById('applyDates').addEventListener('click', () => {
  if (dateMode === 'quarter') {
    const q = parseInt($quarterSelect.value);
    const y = parseInt($yearSelect.value);
    const { start, end } = getQuarterRange(q, y);
    $startDate.value = isoDate(start);
    $endDate.value = isoDate(end);
  }
  applyDates();
});

function applyQuarterSelection() {
  const q = parseInt($quarterSelect.value);
  const y = parseInt($yearSelect.value);
  const { start, end } = getQuarterRange(q, y);
  $startDate.value = isoDate(start);
  $endDate.value = isoDate(end);
  applyDates();
}

/* ── Toast ── */
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

/* ── Util ── */
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Week notes ── */
function renderNotes() {
  $noteCells.innerHTML = '';
  weeks.forEach((w, wi) => {
    const cell = document.createElement('div');
    cell.className = 'note-cell' + (isCurrentWeek(w) ? ' today-col' : '');
    cell.dataset.week = wi;

    const note = weekNotes[wi] || '';
    if (note) {
      cell.innerHTML = `<div class="note-indicator"></div><div class="note-preview">${escHtml(note)}</div>`;
      cell.title = note;
    } else {
      cell.innerHTML = `<span class="note-placeholder">+ note</span>`;
    }

    cell.addEventListener('click', () => openNoteModal(wi));
    $noteCells.appendChild(cell);
  });
}

document.getElementById('notesToggle').addEventListener('click', () => {
  const row = document.getElementById('notesRow');
  row.classList.toggle('collapsed');
  syncStickyOffsets();
});

function syncStickyOffsets() {
  const header = document.getElementById('ganttHeader');
  const notesRow = document.getElementById('notesRow');
  const headerH = header.getBoundingClientRect().height;
  notesRow.style.top = headerH + 'px';
}

function openNoteModal(weekIdx) {
  const w = weeks[weekIdx];
  const existing = weekNotes[weekIdx] || '';

  const overlay = document.createElement('div');
  overlay.className = 'note-modal-overlay';

  overlay.innerHTML = `
    <div class="note-modal">
      <h3>Week ${weekIdx + 1} Notes</h3>
      <div class="note-modal-dates">${formatShort(w.start)} – ${formatShort(w.end)}</div>
      <textarea id="noteTextarea" placeholder="Add notes for this week...">${escHtml(existing)}</textarea>
      <div class="note-modal-actions">
        <button class="btn btn-ghost" id="noteDeleteBtn">Clear</button>
        <button class="btn btn-ghost" id="noteCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="noteSaveBtn">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const textarea = overlay.querySelector('#noteTextarea');
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);

  overlay.querySelector('#noteSaveBtn').addEventListener('click', () => {
    const val = textarea.value.trim();
    if (val) {
      weekNotes[weekIdx] = val;
    } else {
      delete weekNotes[weekIdx];
    }
    overlay.remove();
    renderNotes();
    renderHeaders();
  });

  overlay.querySelector('#noteCancelBtn').addEventListener('click', () => overlay.remove());

  overlay.querySelector('#noteDeleteBtn').addEventListener('click', () => {
    delete weekNotes[weekIdx];
    overlay.remove();
    renderNotes();
    renderHeaders();
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Escape') overlay.remove();
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      overlay.querySelector('#noteSaveBtn').click();
    }
  });
}

/* ── Editable chart title ── */
const $chartTitle = document.getElementById('chartTitle');

$chartTitle.addEventListener('focus', () => $chartTitle.classList.add('editing'));

$chartTitle.addEventListener('blur', () => {
  $chartTitle.classList.remove('editing');
  const text = $chartTitle.textContent.trim();
  if (!text) $chartTitle.textContent = 'ATLAS';
  document.getElementById('exportChartName').textContent = $chartTitle.textContent;
  document.title = $chartTitle.textContent;
  document.getElementById('atlasSubtitle').style.display =
    $chartTitle.textContent.trim().toUpperCase() === 'ATLAS' ? '' : 'none';
});

$chartTitle.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    $chartTitle.blur();
  }
});

/* ── Export as image ── */
document.getElementById('exportBtn').addEventListener('click', async () => {
  const btn = document.getElementById('exportBtn');
  const original = btn.textContent;
  btn.textContent = 'Exporting…';
  btn.disabled = true;

  const dateRange = document.getElementById('exportDateRange');
  const s = $startDate.value;
  const e = $endDate.value;
  if (s && e) {
    const sd = new Date(s + 'T00:00:00');
    const ed = new Date(e + 'T00:00:00');
    dateRange.textContent = `${formatShort(sd)} – ${formatShort(ed)}`;
  }

  document.body.classList.add('exporting');

  const container = document.getElementById('ganttContainer');
  const wrapper = document.getElementById('ganttWrapper');
  const prevOverflow = wrapper.style.overflow;
  const prevScroll = wrapper.scrollLeft;
  wrapper.style.overflow = 'visible';
  wrapper.scrollLeft = 0;

  await new Promise(r => setTimeout(r, 100));

  try {
    const canvas = await html2canvas(container, {
      backgroundColor: '#0f1117',
      scale: 2,
      useCORS: true,
      logging: false,
    });

    const link = document.createElement('a');
    const chartName = (document.getElementById('chartTitle').textContent || 'Gantt Chart').replace(/[/\\?%*:|"<>]/g, '');
    link.download = `${chartName}-${new Date().toISOString().split('T')[0]}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Chart exported as PNG');
  } catch (err) {
    showToast('Export failed — see console for details');
    console.error('Export error:', err);
  } finally {
    document.body.classList.remove('exporting');
    wrapper.style.overflow = prevOverflow;
    wrapper.scrollLeft = prevScroll;
    btn.textContent = original;
    btn.disabled = false;
  }
});

/* ── Export as Excel ── */
document.getElementById('exportExcelBtn').addEventListener('click', () => {
  const btn = document.getElementById('exportExcelBtn');
  btn.textContent = 'Exporting…';
  btn.disabled = true;

  try {
    const title = document.getElementById('chartTitle').textContent || 'Gantt Chart';
    const wb = XLSX.utils.book_new();

    const headerRow = ['Task', 'Tag', 'Weeks'];
    weeks.forEach((w, i) => {
      headerRow.push(`W${i + 1}\n${formatShort(w.start)} – ${formatShort(w.end)}`);
    });

    const data = [headerRow];

    const merges = [];

    chartRows.forEach((row, ri) => {
      const t = row.task;
      const r = [t.name, t.category || '', t.weeks + 'w'];
      weeks.forEach(() => r.push(''));
      data.push(r);

      if (t.startWeek !== null) {
        if (t.segments && t.segments.length) {
          let sw = t.startWeek;
          t.segments.forEach(seg => {
            if (seg.weeks > 1) {
              merges.push({
                s: { r: ri + 1, c: sw + 3 },
                e: { r: ri + 1, c: sw + seg.weeks - 1 + 3 },
              });
            }
            sw += seg.weeks;
          });
        } else if (t.weeks > 1) {
          merges.push({
            s: { r: ri + 1, c: t.startWeek + 3 },
            e: { r: ri + 1, c: t.startWeek + t.weeks - 1 + 3 },
          });
        }
      }
    });

    const notesRow = ['Notes', '', ''];
    let hasNotes = false;
    weeks.forEach((_, wi) => {
      const note = weekNotes[wi] || '';
      if (note) hasNotes = true;
      notesRow.push(note);
    });
    if (hasNotes) data.push(notesRow);

    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!merges'] = merges;

    const colWidths = [{ wch: 22 }, { wch: 12 }, { wch: 6 }];
    weeks.forEach(() => colWidths.push({ wch: 16 }));
    ws['!cols'] = colWidths;

    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      return hex.toUpperCase();
    }

    const headerStyle = {
      font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
      fill: { patternType: 'solid', fgColor: { rgb: '1A1D27' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border: {
        top: { style: 'thin', color: { rgb: '2E3345' } },
        bottom: { style: 'thin', color: { rgb: '2E3345' } },
        left: { style: 'thin', color: { rgb: '2E3345' } },
        right: { style: 'thin', color: { rgb: '2E3345' } },
      }
    };

    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c: C });
      if (ws[addr]) ws[addr].s = headerStyle;
    }

    const taskCellStyle = (taskColor) => ({
      fill: { patternType: 'solid', fgColor: { rgb: taskColor } },
      border: {
        top: { style: 'thin', color: { rgb: '2E3345' } },
        bottom: { style: 'thin', color: { rgb: '2E3345' } },
        left: { style: 'thin', color: { rgb: '2E3345' } },
        right: { style: 'thin', color: { rgb: '2E3345' } },
      }
    });

    chartRows.forEach((row, ri) => {
      const t = row.task;
      const excelRow = ri + 1;

      if (t.startWeek !== null) {
        if (t.segments && t.segments.length) {
          let sw = t.startWeek;
          t.segments.forEach(seg => {
            const segStyle = taskCellStyle(hexToRgb(seg.color));
            for (let wi = sw; wi < sw + seg.weeks; wi++) {
              const addr = XLSX.utils.encode_cell({ r: excelRow, c: wi + 3 });
              if (!ws[addr]) ws[addr] = { t: 's', v: '' };
              ws[addr].s = segStyle;
            }
            sw += seg.weeks;
          });
        } else {
          const style = taskCellStyle(hexToRgb(t.color));
          for (let wi = t.startWeek; wi < t.startWeek + t.weeks; wi++) {
            const addr = XLSX.utils.encode_cell({ r: excelRow, c: wi + 3 });
            if (!ws[addr]) ws[addr] = { t: 's', v: '' };
            ws[addr].s = style;
          }
        }
      }

      const nameAddr = XLSX.utils.encode_cell({ r: excelRow, c: 0 });
      if (ws[nameAddr]) {
        ws[nameAddr].s = {
          font: { bold: true, sz: 11 },
          alignment: { vertical: 'center' },
        };
      }
    });

    XLSX.utils.book_append_sheet(wb, ws, title.substring(0, 31));
    const safeName = title.replace(/[/\\?%*:|"<>]/g, '');
    XLSX.writeFile(wb, `${safeName}-${new Date().toISOString().split('T')[0]}.xlsx`);
    showToast('Chart exported as Excel');
  } catch (err) {
    showToast('Excel export failed — see console');
    console.error('Excel export error:', err);
  } finally {
    btn.textContent = 'Export as Excel';
    btn.disabled = false;
  }
});

/* ── Save / Load config ── */
function gatherState() {
  return {
    title: document.getElementById('chartTitle').textContent,
    startDate: $startDate.value,
    endDate: $endDate.value,
    tasks,
    chartRowIds: chartRows.map(r => r.task.id),
    weekNotes,
    categories,
    labelWidth: getComputedStyle(document.documentElement).getPropertyValue('--label-width').trim(),
    nextId,
  };
}

function saveConfig() {
  const data = JSON.stringify(gatherState(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const link = document.createElement('a');
  const configName = (document.getElementById('chartTitle').textContent || 'Gantt Chart').replace(/[/\\?%*:|"<>]/g, '');
  link.download = `${configName}-${new Date().toISOString().split('T')[0]}.json`;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('Config saved as JSON');
}

function loadConfig(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);

      tasks = data.tasks || [];
      nextId = data.nextId || (tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1);
      weekNotes = data.weekNotes || {};
      categories = data.categories || [];

      chartRows = (data.chartRowIds || [])
        .map(id => { const t = tasks.find(tk => tk.id === id); return t ? { task: t } : null; })
        .filter(Boolean);

      if (data.startDate) $startDate.value = data.startDate;
      if (data.endDate) $endDate.value = data.endDate;

      if (data.title) {
        document.getElementById('chartTitle').textContent = data.title;
        document.getElementById('exportChartName').textContent = data.title;
        document.title = data.title;
        document.getElementById('atlasSubtitle').style.display =
          data.title.trim().toUpperCase() === 'ATLAS' ? '' : 'none';
      }

      if (data.labelWidth) {
        document.documentElement.style.setProperty('--label-width', data.labelWidth);
      }

      undoStack = [];
      redoStack = [];
      pendingSnapshot = null;
      lastSnapshot = null;
      applyDates();
      renderTaskBank();
      renderCategoryTags();
      renderCategorySelect();
      updateUndoRedoBtn();
      showToast('Config loaded');
    } catch (err) {
      showToast('Failed to load config — invalid file');
      console.error('Load config error:', err);
    }
  };
  reader.readAsText(file);
}

document.getElementById('saveConfigBtn').addEventListener('click', saveConfig);

document.getElementById('loadConfigBtn').addEventListener('click', () => {
  document.getElementById('loadConfigInput').click();
});

document.getElementById('loadConfigInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadConfig(file);
  e.target.value = '';
});

document.getElementById('sidebarToggle').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');
  const isCollapsed = sidebar.classList.toggle('collapsed');
  btn.textContent = isCollapsed ? '▶' : '◀';
});

/* ── Label column resize ── */
(function() {
  const handle = document.getElementById('labelResizeHandle');
  const container = document.getElementById('ganttContainer');
  let startX, startWidth;

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    handle.classList.add('resizing');
    const current = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--label-width'));
    startWidth = current;
    startX = e.clientX;

    const onMove = ev => {
      const delta = ev.clientX - startX;
      const newWidth = Math.max(100, Math.min(500, startWidth + delta));
      document.documentElement.style.setProperty('--label-width', newWidth + 'px');
    };

    const onUp = () => {
      handle.classList.remove('resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
